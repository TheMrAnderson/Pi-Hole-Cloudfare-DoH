name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  docker-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          pull: true
          load: true
          tags: local/pi-hole-cloudfare-doh:ci

      - name: Start container
        run: |
          docker run -d --name pihole-test \
            -e TZ=America/Chicago \
            -e WEBPASSWORD=test-password \
            -e DNSMASQ_LISTENING=all \
            -e FTLCONF_dns_upstreams=127.0.0.1#5053 \
            -p 8080:80 \
            local/pi-hole-cloudfare-doh:ci

      - name: Verify admin UI and DNS
        run: |
          timeout_seconds=300
          start_time="$(date +%s)"
          while true; do
            if [ "$(docker inspect -f '{{.State.Running}}' pihole-test 2>/dev/null)" != "true" ]; then
              echo "Container is not running"
              docker logs pihole-test || true
              exit 1
            fi
            health_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' pihole-test)"
            if [ "${health_status}" = "healthy" ]; then
              break
            fi
            now="$(date +%s)"
            if [ $((now - start_time)) -ge "${timeout_seconds}" ]; then
              echo "Timed out waiting for healthy container (last health: ${health_status})"
              docker logs pihole-test || true
              exit 1
            fi
            sleep 2
          done

          curl -fsS --retry 10 --retry-all-errors --retry-delay 2 http://127.0.0.1:8080/admin/login >/dev/null 2>&1
          docker exec pihole-test curl -fsS --retry 10 --retry-all-errors --retry-delay 2 http://127.0.0.1/admin/login >/dev/null 2>&1
          docker exec pihole-test pgrep cloudflared >/dev/null
          docker exec pihole-test bash -lc "for i in $(seq 1 10); do dig +short @127.0.0.1 -p 53 cloudflare.com | grep -E '^[0-9.]+' && exit 0; sleep 2; done; exit 1"

      - name: Dump logs on failure
        if: failure()
        run: docker logs pihole-test || true

      - name: Cleanup
        if: always()
        run: docker rm -f pihole-test || true
