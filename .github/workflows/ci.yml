name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  docker-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          pull: true
          load: true
          tags: local/pi-hole-cloudfare-doh:ci

      - name: Start container
        run: |
          docker run -d --name pihole-test \
            -e TZ=America/Chicago \
            -e WEBPASSWORD=test-password \
            -e DNSMASQ_LISTENING=all \
            -e FTLCONF_dns_upstreams=127.0.0.1#5053 \
            -p 8080:80 \
            local/pi-hole-cloudfare-doh:ci

      - name: Verify admin UI and DNS
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/admin/login >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8080/admin/login >/dev/null
          docker exec pihole-test pgrep cloudflared >/dev/null
          docker exec pihole-test bash -lc "dig +short @127.0.0.1 -p 53 cloudflare.com | grep -E '^[0-9.]+'"

      - name: Dump logs on failure
        if: failure()
        run: docker logs pihole-test || true

      - name: Cleanup
        if: always()
        run: docker rm -f pihole-test || true
