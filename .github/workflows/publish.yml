name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: themranderson/pi-hole-cloudfare-doh

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Pi-hole base tag
        id: base
        run: |
          PIHOLE_TAG="$(grep -Eo 'pihole/pihole:[^[:space:]]+' Dockerfile | head -n1 | cut -d: -f2)"
          docker pull --quiet "pihole/pihole:${PIHOLE_TAG}" >/dev/null
          PIHOLE_IMAGE_ID="$(docker image inspect --format '{{.Id}}' "pihole/pihole:${PIHOLE_TAG}")"
          echo "pihole_tag=${PIHOLE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "pihole_image_id=${PIHOLE_IMAGE_ID}" >> "${GITHUB_OUTPUT}"
          echo "Using pihole/pihole:${PIHOLE_TAG} (${PIHOLE_IMAGE_ID})"
          SKIP_BUILD="false"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            docker pull --quiet "${IMAGE_NAME}:latest" >/dev/null 2>&1 || true
            if docker image inspect "${IMAGE_NAME}:latest" >/dev/null 2>&1; then
              PREVIOUS_PUB_ID="$(docker inspect --format='{{index .Config.Labels \"org.opencontainers.image.base.image.id\"}}' "${IMAGE_NAME}:latest")"
              echo "previous_base_image_id=${PREVIOUS_PUB_ID}" >> "${GITHUB_OUTPUT}"
              if [ "${PIHOLE_IMAGE_ID}" = "${PREVIOUS_PUB_ID}" ]; then
                SKIP_BUILD="true"
              fi
            fi
          fi
          echo "skip_build=${SKIP_BUILD}" >> "${GITHUB_OUTPUT}"

      - name: Skip publish - no Pi-hole image change
        if: steps.base.outputs.skip_build == 'true'
        run: |
          echo "Skipping publish because Pi-hole base image did not change."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: steps.base.outputs.skip_build != 'true'

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: steps.base.outputs.skip_build != 'true'

      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          pull: true
          load: true
          build-args: |
            PIHOLE_BASE_TAG=${{ steps.base.outputs.pihole_tag }}
            PIHOLE_BASE_IMAGE_ID=${{ steps.base.outputs.pihole_image_id }}
          tags: local/pi-hole-cloudfare-doh:publish-test
        if: steps.base.outputs.skip_build != 'true'

      - name: Push image tags
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:pihole-${{ steps.base.outputs.pihole_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: steps.base.outputs.skip_build != 'true'

      - name: Dump logs on failure
        if: failure()
        run: echo "Publish failed before/while push step"

      - name: Cleanup
        if: always()
        if: steps.base.outputs.skip_build != 'true'
        run: true

      - name: Open scheduled failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const body = [
              "The scheduled publish workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close scheduled failure issue on recovery
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Resolved by successful run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
