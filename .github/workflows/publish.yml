name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: themranderson/pi-hole-cloudfare-doh

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Pi-hole base tag
        id: base
        run: |
          PIHOLE_TAG="$(grep -Eo 'pihole/pihole:[^[:space:]]+' Dockerfile | head -n1 | cut -d: -f2)"
          echo "pihole_tag=${PIHOLE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Using pihole/pihole:${PIHOLE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          pull: true
          load: true
          tags: local/pi-hole-cloudfare-doh:publish-test

      - name: Start container
        run: |
          docker run -d --name pihole-test \
            -e TZ=America/Chicago \
            -e WEBPASSWORD=test-password \
            -e DNSMASQ_LISTENING=all \
            -e FTLCONF_dns_upstreams=127.0.0.1#5053 \
            -p 8080:80 \
            local/pi-hole-cloudfare-doh:publish-test

      - name: Verify admin UI and DNS
        run: |
          timeout_seconds=300
          start_time="$(date +%s)"
          ready=0
          while true; do
            if [ "$(docker inspect -f '{{.State.Running}}' pihole-test 2>/dev/null)" != "true" ]; then
              echo "Container is not running"
              docker logs pihole-test || true
              exit 1
            fi

            if docker exec pihole-test pgrep pihole-FTL >/dev/null 2>&1 \
              && docker exec pihole-test pgrep cloudflared >/dev/null 2>&1 \
              && docker exec pihole-test curl -fsS --max-time 5 --retry 2 --retry-all-errors --retry-delay 1 http://127.0.0.1/admin/login >/dev/null 2>&1; then
              ready=1
              break
            fi

            now="$(date +%s)"
            if [ $((now - start_time)) -ge "${timeout_seconds}" ]; then
              echo "Timed out waiting for in-container Pi-hole readiness"
              docker logs pihole-test || true
              exit 1
            fi
            sleep 2
          done

          if [ "${ready}" -ne 1 ]; then
            echo "Pi-hole did not become ready"
            docker logs pihole-test || true
            exit 1
          fi
          docker exec pihole-test bash -lc "for i in $(seq 1 10); do dig +short @127.0.0.1 -p 53 cloudflare.com | grep -E '^[0-9.]+' && exit 0; sleep 2; done; exit 1"

      - name: Push image tags
        uses: docker/build-push-action@v6
        with:
          pull: true
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:pihole-${{ steps.base.outputs.pihole_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dump logs on failure
        if: failure()
        run: docker logs pihole-test || true

      - name: Cleanup
        if: always()
        run: docker rm -f pihole-test || true

      - name: Open scheduled failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const body = [
              "The scheduled publish workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close scheduled failure issue on recovery
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Resolved by successful run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
