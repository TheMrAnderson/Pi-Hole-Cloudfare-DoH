name: Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: themranderson/pi-hole-cloudfare-doh

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Pi-hole base tag
        id: base
        run: |
          PIHOLE_TAG="$(grep -Eo 'pihole/pihole:[^[:space:]]+' Dockerfile | head -n1 | cut -d: -f2)"
          echo "pihole_tag=${PIHOLE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Using pihole/pihole:${PIHOLE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          pull: true
          load: true
          tags: local/pi-hole-cloudfare-doh:publish-test

      - name: Push image tags
        uses: docker/build-push-action@v6
        with:
          pull: true
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:pihole-${{ steps.base.outputs.pihole_tag }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dump logs on failure
        if: failure()
        run: echo "Publish failed before/while push step"

      - name: Cleanup
        if: always()
        run: true

      - name: Open scheduled failure issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const body = [
              "The scheduled publish workflow failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close scheduled failure issue on recovery
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Scheduled Docker publish failed";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Resolved by successful run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed"
              });
            }
